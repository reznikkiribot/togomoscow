<!doctype html>
<!--
  Telegram Mini App — тест кнопки «Позвонить» (tel:).
  Открой https://app.togomoscow.ru/call-demo.html в Telegram НА ТЕЛЕФОНЕ.
  Кнопка A — ЧИСТАЯ нативная <a href="tel:"> без JS (эталонный тест).
  Внизу видно ПЛАТФОРМУ (ios/android/tdesktop/…) — сообщи её мне.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Позвонить — тест</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #fff); --text: var(--tg-theme-text-color, #111);
    --hint: var(--tg-theme-hint-color, #8a8a8a); --btn: var(--tg-theme-button-color, #40a7e3);
    --btn-text: var(--tg-theme-button-text-color, #fff); --card: var(--tg-theme-secondary-bg-color, #f4f4f5);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font:16px/1.45 -apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { width:100%; max-width:420px; text-align:center; }
  h2 { font-size:15px; color:var(--hint); font-weight:600; margin:22px 0 8px; text-align:left; }
  .num { font-size:22px; font-weight:700; margin:0 0 8px; }
  .btn { width:100%; display:inline-flex; align-items:center; justify-content:center; gap:10px;
    padding:16px 20px; border:none; border-radius:14px; text-decoration:none; font-size:18px;
    font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--btn); color:var(--btn-text); }
  .btn-soft { background:var(--card); color:var(--text); }
  .btn svg { width:22px; height:22px; fill:currentColor; }
  .env { margin-top:22px; padding:14px; border-radius:12px; background:var(--card); font-size:14px; }
  .env b { font-size:17px; }
  #toast { position:fixed; left:50%; bottom:96px; transform:translateX(-50%); background:rgba(0,0,0,.86);
    color:#fff; padding:10px 16px; border-radius:12px; font-size:14px; font-weight:600; opacity:0;
    transition:opacity .3s; pointer-events:none; }
  #toast.show { opacity:1; }
</style>

<div class="wrap">
  <p class="num" id="num"></p>

  <h2>A) чистая нативная ссылка tel: (без JS)</h2>
  <!-- НИКАКОГО onclick — только href. Если и это не звонит → платформа блокирует tel: -->
  <a class="btn btn-primary" id="callLink">
    <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"/></svg>
    Позвонить (native)
  </a>

  <h2>B) через JS (window.location)</h2>
  <button class="btn btn-soft" onclick="jsCall()">Позвонить (JS)</button>

  <h2>C) запасной путь</h2>
  <button class="btn btn-soft" onclick="copyNum()">📋 Скопировать номер</button>

  <div class="env" id="env">…</div>
</div>
<div id="toast"></div>

<script>
  const PHONE = '+79161234567';
  const telHref = (r) => 'tel:' + String(r||'').replace(/[^\d+]/g,'');
  document.getElementById('num').textContent = PHONE;
  document.getElementById('callLink').setAttribute('href', telHref(PHONE)); // только href, без onclick

  const tg = window.Telegram && window.Telegram.WebApp;
  const inTg = !!(tg && tg.initData !== undefined);
  if (tg) { tg.ready(); tg.expand(); }

  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  function jsCall(){ try{ window.location.href = telHref(PHONE); }catch(e){ window.open(telHref(PHONE),'_self'); } }
  function copyNum(){
    const n = PHONE.replace(/[^\d+]/g,''); const ok=()=>toast('📋 '+n+' скопирован');
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(n).then(ok).catch(()=>leg(n,ok)); } else leg(n,ok);
  }
  function leg(t,ok){ try{const i=document.createElement('input');i.value=t;i.style.position='fixed';i.style.opacity='0';document.body.appendChild(i);i.select();i.setSelectionRange(0,t.length);document.execCommand('copy');i.remove();ok();}catch(e){} }

  // ПЛАТФОРМА — сообщи это значение
  document.getElementById('env').innerHTML = inTg
    ? 'Платформа: <b>' + (tg.platform || '?') + '</b><br>версия Telegram: ' + (tg.version || '?')
    : '<b>Открыто вне Telegram</b> (обычный браузер)';
</script>
