<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
    <title>togomoscow probe</title>
    <script src="/telegram-web-app.js"></script>
    <script>
      (function () {
        function report(kind, detail) {
          try {
            var body = JSON.stringify({
              kind: kind,
              detail: detail || '',
              url: location.href,
              tg: !!(window.Telegram && window.Telegram.WebApp),
              platform: window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp.platform : 'n/a',
              version: window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp.version : 'n/a',
              at: new Date().toISOString()
            });
            navigator.sendBeacon &&
              navigator.sendBeacon('/api/health/client-error', new Blob([body], { type: 'application/json' }));
          } catch (e) {}
        }
        function ready() {
          try {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
              tg.ready();
              tg.expand && tg.expand();
              document.body.dataset.tg = 'yes';
              report('probe-ready', 'telegram ready called');
              return true;
            }
          } catch (e) {
            report('probe-ready-error', e.message || e);
          }
          return false;
        }
        window.addEventListener('error', function (e) {
          report('probe-error', (e.message || 'error') + ' @ ' + (e.filename || ''));
        }, true);
        window.addEventListener('DOMContentLoaded', function () {
          document.getElementById('time').textContent = new Date().toLocaleString();
          if (!ready()) {
            var n = 0;
            var t = setInterval(function () {
              n += 1;
              if (ready() || n > 50) clearInterval(t);
            }, 100);
          }
        });
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #111;
        font: 17px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(320px, calc(100vw - 40px));
        text-align: center;
      }
      .ok {
        display: inline-grid;
        place-items: center;
        width: 54px;
        height: 54px;
        margin-bottom: 18px;
        border-radius: 16px;
        background: #d32323;
        color: #fff;
        font-weight: 800;
        font-size: 24px;
      }
      p {
        margin: 8px 0;
      }
      small {
        color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="ok">OK</div>
      <p>togomoscow probe loaded</p>
      <small id="time"></small>
    </main>
  </body>
</html>
