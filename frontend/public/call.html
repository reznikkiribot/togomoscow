<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Звонок · togomoscow</title>
<!--
  Call screen — matches the togomoscow app style. Opened via tg.openLink() in a browser
  context (where tel: is allowed; the Mini App webview blocks it). Params:
    n=<phone>  name=<venue>  back=<startapp param, e.g. l_<listingId>>
  Auto-attempts the dialer, always shows a tap-to-call button, and a "back" button that
  simply closes this page → returns to the still-open Mini App underneath.
-->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { --bg: #ffffff; --text: #2b2b2b; --hint: #6b6b6b; --accent: #d32323; --border: #e6e6e6; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100vh; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px; text-align: center;
  }
  .brand { font-size: 15px; font-weight: 800; letter-spacing: .2px; color: var(--accent); margin-bottom: 26px; }
  .brand span { color: var(--text); }
  .ico { width: 88px; height: 88px; border-radius: 50%; background: rgba(211, 35, 35, .10);
    display: grid; place-items: center; font-size: 40px; margin-bottom: 16px; }
  .title { font-size: 15px; font-weight: 600; color: var(--hint); margin: 0 0 6px; }
  .venue { font-size: 24px; font-weight: 800; margin: 0 0 26px; line-height: 1.25; }
  a.call { width: 100%; max-width: 360px; display: inline-flex; align-items: center;
    justify-content: center; gap: 10px; text-decoration: none; font-size: 18px; font-weight: 700;
    padding: 16px 20px; border-radius: 12px; background: var(--accent); color: #fff;
    transition: transform .08s ease, opacity .12s ease; }
  a.call:active { transform: scale(.97); opacity: .92; }
  .back-note { width: 100%; max-width: 360px; margin-top: 16px; background: #faf7f0; color: var(--text);
    border: 1px solid #f0e6d8; border-radius: 12px; padding: 14px 16px; font-size: 14px; line-height: 1.45; }
  .hint { margin-top: 14px; color: var(--hint); font-size: 13px; max-width: 320px; line-height: 1.4; }
</style>

<div class="brand">togo<span>moscow</span></div>
<div class="ico">📞</div>
<div class="title">Звоним в заведение</div>
<div class="venue" id="venue"></div>

<a class="call" id="call" href="#">📞 Позвонить</a>
<div class="back-note">
  Чтобы вернуться в приложение <b>без перезапуска</b> — вернитесь в Telegram:
  кнопкой/жестом <b>«Назад»</b> телефона или через переключатель приложений.
  Приложение останется на той же карточке.
</div>
<div class="hint">Если набор номера не открылся сам — нажмите «Позвонить».</div>

<script>
  var q = new URLSearchParams(location.search);
  var n = (q.get('n') || '').replace(/[^\d+]/g, '');
  var name = (q.get('name') || '').trim();
  var back = (q.get('back') || '').trim();
  var href = 'tel:' + n;

  document.getElementById('venue').textContent = name ? '«' + name + '»' : '';
  var a = document.getElementById('call');
  a.setAttribute('href', href);
  a.textContent = '📞 Позвонить ' + n;

  if (n) setTimeout(function () { try { window.location.href = href; } catch (e) {} }, 250);
</script>
